name: Release and Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          release-type: simple
          version-file: version.txt

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install dependencies and security tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit bandit

      - name: Run dependency vulnerability audit
        run: pip-audit -r requirements.txt --strict

      - name: Run static security scan
        run: bandit -q -r . -x tests,tools

  build:
    runs-on: windows-latest
    if: |
      always() &&
      needs.security.result == 'success' &&
      (github.event_name != 'push' || needs.release-please.outputs.release_created == 'true')
    needs: [release-please, security]
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Run tests
      run: python -m unittest discover -s tests -t . -v

    - name: Build GUI (single EXE)
      shell: bash
      run: |
        VERSION=$(cat version.txt)
        FILENAME="NTE-Auto-Fish-v${VERSION}-Windows-x64.exe"
        echo "FILENAME=$FILENAME" >> $GITHUB_ENV
        
        pyinstaller --noconfirm --onefile --windowed --icon="assets/icons/app.ico" \
          --uac-admin \
          --add-data "templates;templates" \
          --add-data "assets;assets" \
          --add-data "version.txt;." \
          --exclude-module unittest \
          --exclude-module test \
          --exclude-module xml \
          --exclude-module pydoc \
          --exclude-module multiprocessing \
          --exclude-module asyncio \
          --exclude-module sqlite3 \
          --exclude-module lib2to3 \
          --exclude-module distutils \
          --exclude-module setuptools \
          --exclude-module _decimal \
          --exclude-module _lzma \
          --exclude-module _bz2 \
          --name "NTE-Auto-Fish" \
          start_gui.py
        
        mv "dist/NTE-Auto-Fish.exe" "dist/$FILENAME"

    - name: Package CLI source
      shell: pwsh
      run: |
        $version = Get-Content version.txt -Raw
        $version = $version.Trim()
        $cliFilename = "NTE-Auto-Fish-v$version-CLI.zip"
        echo "CLI_FILENAME=$cliFilename" >> $env:GITHUB_ENV
        
        New-Item -ItemType Directory -Force -Path dist/cli-package/modules, dist/cli-package/templates | Out-Null
        Copy-Item main.py, config.py, requirements.txt, run.bat, version.txt dist/cli-package/
        Copy-Item modules/* dist/cli-package/modules/
        Copy-Item templates/* dist/cli-package/templates/
        Compress-Archive -Path dist/cli-package/* -DestinationPath "dist/$cliFilename"

    - name: Upload GUI Artifact
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: NTE-Auto-Fish-GUI-Windows
        path: dist/${{ env.FILENAME }}

    - name: Upload CLI Artifact
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: NTE-Auto-Fish-CLI-Windows
        path: dist/${{ env.CLI_FILENAME }}

    - name: Upload Release Artifacts
      if: needs.release-please.outputs.release_created == 'true'
      uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
      with:
        tag_name: ${{ needs.release-please.outputs.tag_name }}
        files: |
          dist/${{ env.FILENAME }}
          dist/${{ env.CLI_FILENAME }}
